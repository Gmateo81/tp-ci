repos:
  # basic hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  # prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier

  # hadolint for dockerfile
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint

  # eslint pour node.js
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: pnpm eslint
        language: system
        files: \.(js|ts)$
        pass_filenames: true
